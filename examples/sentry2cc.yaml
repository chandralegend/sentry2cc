# sentry2cc configuration — wovar-backend (stekz-eu)
# Run with:
#   cd examples/
#   SENTRY_AUTH_TOKEN=sntryu_... sentry2cc --config sentry2cc.yaml --once

# ---------------------------------------------------------------------------
# Sentry connection settings
# ---------------------------------------------------------------------------
sentry:
  auth_token: "${SENTRY_AUTH_TOKEN}"
  organization: "stekz-eu"
  project: "wovar-backend"
  base_url: "https://sentry.io"
  poll_interval: 60
  query: "is:unresolved"

# ---------------------------------------------------------------------------
# Trigger rule
# ---------------------------------------------------------------------------
trigger:
  module: "wovar_rules"
  function: "should_investigate"

# ---------------------------------------------------------------------------
# Claude Code Agent settings
# ---------------------------------------------------------------------------
claude_code:
  cwd: "/Users/chandralegend/Documents/stekz/wms"

  # Read-only tools — we are only investigating and documenting, not editing
  allowed_tools:
    - Read
    - Glob
    - Grep
    - Bash

  permission_mode: "acceptEdits"
  system_prompt: null
  max_turns: 50
  max_budget_usd: 3.0
  model: null

  # Custom template: explore codebase and write findings to a markdown file
  # Must be an absolute path or relative to the working directory where sentry2cc is run.
  prompt_template: "/Users/chandralegend/Documents/stekz/sentry2claude/examples/wovar_prompt.j2"

  # Directory where Claude writes the per-issue findings markdown files.
  # The variable {{ findings_path }} in the template resolves to:
  #   <findings_dir>/<issue_id>.md
  findings_dir: "/Users/chandralegend/Documents/stekz/sentry2claude/examples/findings"

# ---------------------------------------------------------------------------
# Post-execution hook
# ---------------------------------------------------------------------------
post_execution:
  module: "wovar_rules"
  function: "print_findings"
